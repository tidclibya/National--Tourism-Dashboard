<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة مؤشرات السياحة – نسخة كاملة</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {font-family:'Tajawal',sans-serif;background:#f9fbfd;color:#222;margin:0}
    header{background:#0d62ff;color:#fff;padding:1rem;text-align:center}
    nav{display:flex;gap:.5rem;background:#eee;padding:.5rem;justify-content:center}
    nav button{padding:.5rem 1rem;border:none;cursor:pointer;border-radius:6px}
    nav button.active{background:#c8a041;color:#fff}
    section{display:none;padding:1rem}
    section.active{display:block}
    .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem}
    .card{background:#fff;padding:1rem;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.1);text-align:center}
    .value{font-size:1.4rem;color:#0d62ff}
  </style>
</head>
<body>

<header>
  <h1>📊 لوحة مؤشرات السياحة – ليبيا</h1>
</header>

<nav>
  <button class="tab active" data-tab="overview">نظرة عامة</button>
  <button class="tab" data-tab="analysis">التحليلات</button>
  <button class="tab" data-tab="history">التاريخية</button>
  <button class="tab" data-tab="invest">الاستثمار</button>
  <button class="tab" data-tab="forecast">التنبؤ</button>
</nav>

<section id="overview" class="active"><div class="kpis" id="kpi-box"></div></section>
<section id="analysis"><canvas id="chart1"></canvas></section>
<section id="history"><canvas id="chart2"></canvas></section>
<section id="invest"><canvas id="chart4"></canvas></section>
<section id="forecast"><canvas id="chart3"></canvas></section>

<script>
document.querySelectorAll(".tab").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll("section").forEach(sec=>sec.classList.remove("active"));
    document.getElementById(btn.dataset.tab).classList.add("active");
  });
});

async function loadData(file){
  const res = await fetch('data/'+file);
  return await res.json();
}

// KPIs
loadData("overview.json").then(data=>{
  let box=document.getElementById("kpi-box");
  data.kpis.forEach(k=>{
    box.innerHTML+=`<div class="card"><div class="value">${k.value}</div><div>${k.label}</div></div>`;
  });
});

// Analysis
loadData("analysis.json").then(d=>{
  new Chart(document.getElementById("chart1"),{
    type:'bar',
    data:{labels:d.labels,datasets:[{label:d.label,data:d.values,backgroundColor:"#0d62ff"}]}
  });
});

// History
loadData("history.json").then(d=>{
  new Chart(document.getElementById("chart2"),{
    type:'line',
    data:{labels:d.labels,datasets:[{label:d.label,data:d.values,borderColor:"#c8a041",fill:false}]}
  });
});

// Investment
loadData("invest.json").then(d=>{
  new Chart(document.getElementById("chart4"),{
    type:'pie',
    data:{labels:d.projects.map(p=>p.name),datasets:[{data:d.projects.map(p=>p.value)}]}
  });
});

// Forecast
loadData("forecast.json").then(d=>{
  new Chart(document.getElementById("chart3"),{
    type:'line',
    data:{
      labels:d.labels,
      datasets:d.scenarios.map(s=>({label:s.label,data:s.values,borderColor:s.color,fill:false}))
    }
  });
});
</script>
</body>
</html>
